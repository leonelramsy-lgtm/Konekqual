{% extends 'collecte/base.html' %}
{% block title %}Modifier - KonekQual{% endblock %}
{% block content %}
<div class="page-header"><h1>Modifier le signalement #{{ signalement.id }}</h1></div>
<form method="POST" class="form-signalement">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Enregistrer</button>
    <a href="{% url 'dashboard' %}" class="btn btn-ghost">Annuler</a>
</form>
{% endblock %}
